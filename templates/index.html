<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ITM Gorakhpur - College FAQ Chatbot</title>
<link rel="icon" type="image/png" sizes="32x32" href="{{ url_for('static', filename='images/favicon-32.png') }}">
<link rel="icon" type="image/png" sizes="16x16" href="{{ url_for('static', filename='images/favicon-16.png') }}">
<link rel="apple-touch-icon" sizes="180x180" href="{{ url_for('static', filename='images/favicon-180.png') }}">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

  <div id="splash-screen">
    <div class="splash-content">
      <div class="splash-icon"><img src="{{ url_for('static', filename='images/itm-logo.png') }}" alt="ITM Gorakhpur logo"></div>
      <h1 class="splash-title">ITM GIDA Gorakhpur</h1>
      <p class="splash-subtitle">College FAQ Assistant</p>
      <div class="splash-loader"><span></span><span></span><span></span></div>
    </div>
  </div>

  <div class="chat-container" id="chat-container">
    <div class="chat-header">
      <div class="header-icon"><img src="{{ url_for('static', filename='images/itm-logo.png') }}" alt="ITM Gorakhpur logo"></div>
      <div class="header-text">
        <h2>ITM GIDA Gorakhpur</h2>
        <p><span class="status-dot"></span> <span id="header-subtitle">College FAQ Assistant</span></p>
      </div>
      <button id="lang-toggle" aria-label="Switch language" title="Switch language">EN</button>
      <button id="theme-toggle" aria-label="Toggle dark mode" title="Toggle dark mode">🌙</button>
    </div>

    <div class="chat-box" id="chat-box">
      <div class="message bot-message" id="welcome-message">
        Hello! I'm the ITM Gorakhpur FAQ bot. Ask me about admission, fees, courses, hostel, or timings.
      </div>

      <div class="suggestions" id="suggestions">
        <button class="chip" data-en="What is the admission process?" data-hi="Admission process kya hai?">What is the admission process?</button>
        <button class="chip" data-en="What is the fee for BCA?" data-hi="BCA ki fee kitni hai?">What is the fee for BCA?</button>
        <button class="chip" data-en="Is hostel available?" data-hi="Kya hostel available hai?">Is hostel available?</button>
        <button class="chip" data-en="What courses are offered?" data-hi="Kaun kaun se courses available hain?">What courses are offered?</button>
      </div>
    </div>

    <div class="chat-input">
      <input type="text" id="user-input" placeholder="Type your question here..." autocomplete="off">
      <button id="send-btn" aria-label="Send">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
          <path d="M3 20L21 12L3 4V10L16 12L3 14V20Z" fill="currentColor"/>
        </svg>
      </button>
    </div>

    <div class="chat-footer" id="chat-footer">Powered by ITM GIDA Gorakhpur · AI FAQ Assistant<br><span class="dev-credit">Made by <a href="https://github.com/abhaypandey0572005-max" target="_blank" rel="noopener">Abhay Pandey</a></span></div>
  </div>

  <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
